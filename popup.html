<!DOCTYPE html>
<html>
<head>

<style>

body{
  width:260px;
  font-family: Arial;
  background:#f9fafb;
  padding:15px;
}

.title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:10px;
}

.card{
  background:white;
  border-radius:10px;
  padding:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  cursor:pointer;
}

.footer{
  margin-top:10px;
  font-size:12px;
  color:gray;
}

</style>

</head>

<body>

<div class="card">

<div class="title">🤖 AI Explainer</div>

<button id="explain">Test AI</button>

<div class="footer">
Highlight text on any page to use AI.
</div>

</div>

<script src="popup.js"></script>

</body>
</html>
